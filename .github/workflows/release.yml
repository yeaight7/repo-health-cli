name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Packed CLI smoke
        run: npm run test:pack

      - name: Publish to npm
        run: npm publish --access public

      - name: Verify local strict audit
        run: node dist/cli.js audit . --strict
